backend:
  name: github
  repo: martjemeyer/verdandi-weaver
  branch: main
  base_url: https://verdandi-cms-auth.martjemeyer.workers.dev

media_folder: src/assets/uploads
public_folder: /assets/uploads

collections:

  - name: books
    label: Books
    label_singular: Book
    folder: src/content/books
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Tags / Meta, name: meta, widget: string, hint: "e.g. Belonging · Boundaries · Departure" }
      - { label: Description, name: description, widget: text }
      - label: Cover colour
        name: cover
        widget: select
        options:
          - { label: "Green (1)", value: "1" }
          - { label: "Blue (2)", value: "2" }
          - { label: "Warm (3)", value: "3" }
          - { label: "Stone (4)", value: "4" }
          - { label: "Sage (5)", value: "5" }
          - { label: "Moss (6)", value: "6" }
      - { label: Cover image, name: image, widget: image, required: false, hint: "Upload a cover image — replaces the colour cover when present" }
      - { label: Amazon ASIN, name: asin, widget: string, required: false, hint: "Amazon product ID — e.g. B0FX19F48V. Automatically opens the right country store for the visitor." }
      - { label: Link URL, name: href, widget: string, required: false, hint: "Manual link — only used if no ASIN is set. e.g. https://..." }
      - { label: Order, name: order, widget: number, default: 99 }

  - name: articles
    label: Articles & Reflections
    label_singular: Article
    folder: src/content/articles
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false, default: "2026-07-18", hint: "Defaults to today — the date picker's year scroller starts wherever this default is set, so keep it current" }
      - { label: Description, name: description, widget: text }
      - label: Topic tags
        name: topics
        widget: list
        required: false
        hint: "Type any tags, one per line. These become clickable and connect this article to a shared tag page (e.g. /tags/care/) with everything else on the site that shares a tag."
      - { label: Body, name: body, widget: markdown }

  - name: ecosystem
    label: "Explore (main site)"
    label_singular: Explore entry
    folder: src/content/ecosystem
    create: true
    slug: "{{order}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Kind
        name: kind
        widget: select
        options:
          - { label: "Reflection", value: reflect }
          - { label: "Deep read", value: read }
          - { label: "Video", value: video }
          - { label: "Framework", value: frame }
          - { label: "Guide / PDF", value: guide }
          - { label: "Gathering / Event", value: event }
      - { label: Type label, name: type_label, widget: string, required: false, hint: "e.g. Reflection · 4 min  or  Video reflection" }
      - label: Topic tags
        name: topics
        widget: list
        required: false
        hint: "Type any tags, one per line. These become the filter chips on the Explore page, and connect this entry to a shared tag page (e.g. /tags/care/) with everything else on the site that shares a tag."
      - { label: Call to action, name: cta, widget: string, required: false, hint: "e.g. Read →  or  Watch →  or  Download →" }
      - { label: Description, name: body, widget: text, required: false, hint: "Optional short text shown below the title" }
      - { label: Image, name: image, widget: image, required: false, hint: "Optional card image — if set, shows instead of the quote or video. For videos, leave empty and use the YouTube URL below." }
      - { label: Wide card (spans 2 columns), name: wide, widget: boolean, default: false, required: false }
      - { label: Tall card (spans 2 rows), name: tall, widget: boolean, default: false, required: false }
      - { label: Order, name: order, widget: number, default: 99 }
      - { label: Link URL, name: href, widget: string, required: false, hint: "Page or URL to open when the card is clicked — e.g. /articles.html or https://..." }

      # Video
      - label: YouTube URL
        name: youtube_url
        widget: string
        required: false
        hint: "Paste any YouTube link — the video plays inside the card"
        condition: { field: kind, value: video }
      - label: Video orientation
        name: orientation
        widget: select
        required: false
        default: landscape
        options:
          - { label: "Landscape (16:9)", value: landscape }
          - { label: "Portrait (9:16)", value: portrait }
        condition: { field: kind, value: video }

      # Reflection / Deep read / Blog
      - label: Card quote
        name: paper_text
        widget: string
        required: false
        hint: "Short phrase shown as a visual on the card when no image is set — e.g. 'The body knows things the mind hasn't named yet.'"
        condition: { field: kind, pattern: "reflect|read" }

      # Guide
      - label: Page count
        name: folio_pages
        widget: string
        required: false
        hint: "e.g. PDF · 24 pages"
        condition: { field: kind, value: guide }

      # Event
      - label: Event day
        name: event_day
        widget: string
        required: false
        hint: "e.g. 14"
        condition: { field: kind, value: event }
      - label: Event month & type
        name: event_month
        widget: string
        required: false
        hint: "e.g. June · evening"
        condition: { field: kind, value: event }

      # Framework
      - label: Framework number
        name: framework_num
        widget: string
        required: false
        hint: "e.g. 7 — determines which diagram is shown on the card"
        condition: { field: kind, value: frame }

  - name: about
    label: About
    label_singular: About
    folder: src/content/about
    create: false
    slug: "about"
    fields:
      - { label: Hero title, name: hero_title, widget: string, default: "A space for soul presence" }
      - { label: Profile image, name: image, widget: image, required: false, hint: "Portrait photo of Sara — shown at the top of the About page" }
      - { label: Lead text, name: lead, widget: text, hint: "The opening paragraph below the portrait" }
      - { label: "What this work is", name: what_it_is, widget: text }
      - { label: "What it isn't", name: what_it_isnt, widget: text }
      - { label: "How it's offered", name: how_offered, widget: text }
      - { label: Pull quote, name: pull, widget: string, required: false, hint: "e.g. You don't awaken out of being human. You awaken into it." }
      - { label: Footer note, name: footer_note, widget: string, required: false, hint: 'e.g. Working from Sweden · in English & Swedish.' }

  - name: frameworks
    label: "Frameworks (main site)"
    label_singular: Framework
    folder: src/content/frameworks
    create: true
    slug: "framework-{{num}}"
    fields:
      - { label: Number, name: num, widget: string, hint: "e.g. 10" }
      - { label: Title, name: title, widget: string }
      - { label: Eyebrow, name: eyebrow, widget: string, hint: "e.g. Framework 10 · Topic · Subtopic" }
      - { label: Lead text, name: lead, widget: text }
      - { label: Body (markdown), name: body, widget: markdown }
      - { label: Pull quote, name: pull, widget: string, required: false }

  # ============================================================
  # Rethinking Society — everything below lives on the
  # /rethinking-society/ pages, not the main site.
  # ============================================================

  - name: rethinking-episodes
    label: "🎬 Rethinking Society — Episodes"
    label_singular: Episode
    folder: src/content/rethinking-episodes
    create: true
    slug: "{{fields.series}}-episode-{{fields.number}}-{{fields.language}}"
    summary: "{{fields.language}} · Ep. {{fields.number}} — {{fields.title}} ({{fields.status}})"
    view_groups:
      - { label: Language, field: language }
    view_filters:
      - { label: English, field: language, pattern: "English" }
      - { label: Swedish, field: language, pattern: "Swedish" }
      - { label: Published, field: status, pattern: "published" }
      - { label: Draft, field: status, pattern: "draft" }
    fields:
      - label: Language
        name: language
        widget: select
        options: ["English", "Swedish"]
        default: "English"
        hint: "Step 1 — which language is this episode entry written in?"
      - label: Series
        name: series
        widget: select
        options: ["Rethinking Society"]
        default: "Rethinking Society"
        hint: "Step 2 — which series does this belong to?"
      - { label: Episode number, name: number, widget: number, hint: "Step 3 — e.g. 1" }
      - { label: Display order, name: displayOrder, widget: number, required: false, hint: "Optional — only needed if you want the display order to differ from the episode number" }
      - { label: Title, name: title, widget: string, hint: "Step 4" }
      - { label: Central question, name: question, widget: text, hint: "Step 4 — just the ONE main question. Put any supporting questions in 'Key questions' below, not here." }
      - label: Key questions
        name: key_questions
        widget: list
        required: false
        hint: "Optional — supporting questions, each as its own line (not one paragraph). They'll show as a spaced-out list on the page."
      - { label: Short description, name: short_description, widget: text, required: false, hint: "Step 5 — a sentence or two shown under the question. Leave empty until written." }
      - label: Topic tags
        name: topics
        widget: list
        required: false
        hint: "Step 5 — type any tags, in the same language as this episode, one per line"
      - { label: Thumbnail, name: thumbnail, widget: image, required: false, hint: "Step 6" }
      - { label: YouTube video URL, name: videoUrl, widget: string, required: false, hint: "Step 7 — leave empty to show a 'Video coming soon' state" }
      - label: PDF resources
        name: resources
        widget: list
        required: false
        hint: "Step 8 — discussion guides, worksheets, etc. for this episode"
        fields:
          - label: Resource type
            name: type
            widget: select
            hint: "Shown to visitors as \"Free Starter Pack\" / \"Gratis startpaket\" — the label here is just this internal type name, unchanged so existing entries keep working."
            options:
              - { label: "Free Starter Pack", value: "One-Page Conversation Starter" }
              - { label: "Discussion Guide", value: "Discussion Guide" }
              - { label: "Worksheet Pack", value: "Worksheet Pack" }
              - { label: "Facilitator Edition", value: "Facilitator Edition" }
              - { label: "Circle Kit", value: "Circle Kit" }
              - { label: "Print-Shop Edition", value: "Print-Shop Edition" }
              - { label: "Complete Episode Bundle", value: "Complete Episode Bundle" }
          - { label: Title, name: title, widget: string }
          - label: Language
            name: language
            widget: select
            options: ["English", "Swedish", "Both"]
            default: "English"
            hint: "This resource's own language — can differ from the episode's language above"
          - { label: Format, name: format, widget: string, required: false, hint: "e.g. PDF · 6 pages" }
          - label: Price type
            name: price_type
            widget: select
            options: ["Free", "Paid", "Bundle", "Coming soon"]
          - { label: Buy Me a Coffee / product URL, name: url, widget: string, required: false, hint: "Leave empty to show 'Available soon'" }
      - { label: Translation key, name: translationKey, widget: string, hint: "Step 9 — the SAME value on both the English and Swedish version of this episode connects them, e.g. rethinking-society-episode-1" }
      - label: Status
        name: status
        widget: select
        default: draft
        options:
          - { label: Published, value: published }
          - { label: Draft, value: draft }
        hint: "Step 10 — only Published episodes appear on the live page"
      - { label: Short call to action, name: cta, widget: string, required: false, hint: "Optional — e.g. 'Watch, then bring it to your next conversation.'" }
      - label: Support links
        name: support_links
        widget: list
        required: false
        hint: "Optional — extra links shown with this episode (beyond the default Support page link)"
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - { label: Publication date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false, required: false, default: "2026-07-18", hint: "Defaults to today — change it to the real publish date, or clear it if not published yet" }
      - { label: Runtime, name: runtime, widget: string, required: false, hint: "e.g. 18 min — leave empty if unknown" }
      - label: Main themes
        name: themes
        widget: list
        required: false
        fields:
          - { label: Theme, name: theme, widget: string }
      - label: Key quotations
        name: quotes
        widget: list
        required: false
        hint: "Genuine pull-quotes only — one PER entry, click 'Add' below for each new one. For simple chapter markers (just a time and a short label), use 'Timestamps' below instead — you don't need a quote to add a timestamp."
        fields:
          - { label: Quote, name: text, widget: text }
          - { label: Timestamp, name: mark, widget: string, required: false, hint: "Optional — only if this exact quote also marks a moment in the video, e.g. 01:08" }
      - label: Timestamps
        name: timestamps
        widget: list
        required: false
        hint: "Chapter markers for the video — just a time and a short label PER entry. Click 'Add' below for each new one; don't paste a whole list into a single entry."
        fields:
          - { label: Time, name: time, widget: string, hint: "e.g. 01:08" }
          - { label: Label, name: label, widget: string, hint: "A short chapter title for this moment" }

  - name: rethinking-events
    label: "📅 Rethinking Society — Gather Online"
    label_singular: Event
    folder: src/content/rethinking-events
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Event title, name: title, widget: string }
      - label: Event type
        name: event_type
        widget: select
        options: ["Episode Conversation", "Open Rethinking Society Circle", "Live Q&A", "Facilitator Gathering", "Special Topic Event"]
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false, default: "2026-07-18" }
      - { label: Time, name: time, widget: string, hint: "e.g. 19:00" }
      - { label: Time zone, name: timezone, widget: string, hint: "e.g. CET" }
      - { label: Online platform, name: platform, widget: string, hint: "e.g. Zoom" }
      - { label: Description, name: description, widget: text }
      - { label: Registration URL, name: registration_url, widget: string, required: false }
      - { label: Cost or donation status, name: cost, widget: string, required: false, hint: "e.g. Free · donation welcome" }
      - { label: Recording availability, name: recording, widget: string, required: false }
      - label: Status
        name: status
        widget: select
        default: upcoming
        options: [upcoming, past, cancelled]

  - name: rethinking-partners
    label: "🤝 Rethinking Society — Partners & Supporters"
    label_singular: Partner
    folder: src/content/rethinking-partners
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Logo, name: logo, widget: image, required: false }
      - { label: Website, name: website, widget: string, required: false }
      - { label: Short description, name: description, widget: text }
      - label: Support type
        name: support_type
        widget: select
        options: ["Funding Partner", "Community Partner", "Creative Contributor", "Translation & Accessibility Support", "Friend of the Project"]
      - { label: Permission to display publicly confirmed, name: public_ok, widget: boolean, default: false }
