<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Verdandi Weaver · Content Editor</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // ── Inject site styles into preview pane ──────────────────────
    CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital@0;1&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=block');
    CMS.registerPreviewStyle('/assets/tokens.css');
    CMS.registerPreviewStyle('/assets/components.css');
    CMS.registerPreviewStyle(`
      body { padding: 2rem; }
      .preview-wrap { max-width: 480px; }
      .preview-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; opacity: .45; margin-bottom: 1.5rem; font-family: var(--font-sans, Inter, sans-serif); }
    `, { raw: true });

    var h = window.h || (window.React && window.React.createElement);

    // ── Helper: YouTube ID ─────────────────────────────────────────
    function ytId(url) {
      if (!url) return '';
      var m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : '';
    }

    // ── Ecosystem card preview ─────────────────────────────────────
    var EcosystemPreview = function(props) {
      var data = props.entry.get('data').toJS();
      var kind      = data.kind || 'reflect';
      var title     = data.title || '';
      var typeLabel = data.type_label || '';
      var body      = data.body || '';
      var cta       = data.cta || '';
      var image     = data.image || '';
      var paperText = data.paper_text || '';
      var youtubeUrl= data.youtube_url || '';
      var themes    = data.themes || [];
      var wide      = data.wide;
      var tall      = data.tall;

      var videoId = ytId(youtubeUrl);
      var imgSrc  = image ? props.getAsset(image).toString() : '';

      var cardClass = 'ent ent--' + kind + (wide ? ' ent--wide' : '') + (tall ? ' ent--tall' : '');

      // Media area
      var media;
      if (imgSrc) {
        media = h('img', { src: imgSrc, alt: title, style: { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' } });
      } else if (kind === 'video' && videoId) {
        media = h('iframe', { src: 'https://www.youtube-nocookie.com/embed/' + videoId + '?rel=0', frameBorder: '0', allowFullScreen: true, style: { position: 'absolute', inset: 0, width: '100%', height: '100%', border: 0 } });
      } else if (kind === 'reflect' || kind === 'read') {
        media = h('div', { className: 'paper' }, paperText);
      } else {
        media = null;
      }

      return h('div', { className: 'preview-wrap' },
        h('p', { className: 'preview-label' }, 'Card preview'),
        h('a', { className: cardClass, style: { display: 'flex', flexDirection: 'column', textDecoration: 'none', color: 'inherit' } },
          h('div', { className: 'ent__media' }, media),
          typeLabel ? h('span', { className: 'ent__type' }, typeLabel) : null,
          h('h3', { className: 'ent__title' }, title),
          body ? h('p', { className: 'ent__body' }, body) : null,
          h('div', { className: 'ent__foot' },
            h('div', { className: 'ent__tags' },
              themes.map(function(t, i) {
                return h('span', { key: i }, t.replace(/-/g, ' '));
              })
            ),
            cta ? h('span', {}, cta) : null
          )
        )
      );
    };

    CMS.registerPreviewTemplate('ecosystem', EcosystemPreview);

    // ── About preview ──────────────────────────────────────────────
    var AboutPreview = function(props) {
      var data = props.entry.get('data').toJS();
      var imgSrc = data.image ? props.getAsset(data.image).toString() : '';

      return h('div', { className: 'preview-wrap' },
        h('p', { className: 'preview-label' }, 'About page preview'),
        h('section', { style: { marginBottom: '2rem' } },
          h('p', { className: 't-eyebrow', style: { marginBottom: '0.5rem' } }, 'About'),
          h('h1', { className: 't-h1' }, data.hero_title || 'A space for soul presence')
        ),
        h('div', { className: 'stack-lg' },
          imgSrc
            ? h('div', { className: 'figure', style: { aspectRatio: '4/3', overflow: 'hidden', borderRadius: 'var(--radius-lg)' } },
                h('img', { src: imgSrc, alt: 'Sara Leidelmeijer', style: { width: '100%', height: '100%', objectFit: 'cover' } })
              )
            : h('div', { className: 'figure', style: { aspectRatio: '4/3' } },
                h('div', { className: 'placeholder', style: { aspectRatio: '4/3' } }, '[ portrait — Sara Leidelmeijer ]')
              ),
          h('p', { className: 't-lead' }, data.lead || ''),
          data.what_it_is   ? h('div', {}, h('h2', { className: 't-h3' }, 'What this work is'), h('p', { className: 't-body' }, data.what_it_is)) : null,
          data.what_it_isnt ? h('div', {}, h('h2', { className: 't-h3' }, "What it isn't"), h('p', { className: 't-body' }, data.what_it_isnt)) : null,
          data.how_offered  ? h('div', {}, h('h2', { className: 't-h3' }, "How it's offered"), h('p', { className: 't-body' }, data.how_offered)) : null,
          data.pull         ? h('p', { className: 'pull' }, data.pull) : null,
          data.footer_note  ? h('p', { className: 't-meta', style: { textAlign: 'center' } }, data.footer_note) : null
        )
      );
    };

    CMS.registerPreviewTemplate('about', AboutPreview);

    // ── Rethinking Society episode preview ──────────────────────────
    var EpisodePreview = function(props) {
      var data     = props.entry.get('data').toJS();
      var lang     = data.language === 'Swedish' ? 'Swedish' : 'English';
      var num      = data.number ? (data.number < 10 ? '0' + data.number : String(data.number)) : '—';
      var thumbSrc = data.thumbnail ? props.getAsset(data.thumbnail).toString() : '';
      var topics   = Array.isArray(data.topics) ? data.topics : [];
      var resources = Array.isArray(data.resources) ? data.resources : [];
      var keyQuestions = Array.isArray(data.key_questions) ? data.key_questions : [];
      var timestamps = Array.isArray(data.timestamps) ? data.timestamps : [];

      return h('div', { className: 'preview-wrap' },
        h('p', { className: 'preview-label' }, 'Episode preview — ' + lang + ' · ' + (data.status || 'draft')),
        h('div', {
            style: {
              aspectRatio: '16/9', borderRadius: 'var(--radius-lg)', overflow: 'hidden',
              background: 'var(--c-bg-sunk)', marginBottom: '1.5rem', display: 'grid', placeItems: 'center'
            }
          },
          thumbSrc
            ? h('img', { src: thumbSrc, alt: '', style: { width: '100%', height: '100%', objectFit: 'cover' } })
            : h('p', { className: 't-meta' }, data.videoUrl ? 'Video linked' : 'Video coming soon')
        ),
        h('p', { className: 't-eyebrow', style: { marginBottom: '0.5rem' } }, 'Episode ' + num),
        h('h2', { className: 't-h3', style: { marginBottom: '0.5rem' } }, data.title || 'Untitled episode'),
        h('p', { className: 't-lead', style: { marginBottom: '0.75rem' } }, data.question || ''),
        data.short_description ? h('p', { className: 't-body', style: { marginBottom: '0.75rem' } }, data.short_description) : null,
        keyQuestions.length
          ? h('ul', { style: { margin: '0 0 1rem', paddingLeft: '1.2em' } },
              keyQuestions.map(function (q, i) { return h('li', { key: i, className: 't-body', style: { marginBottom: '0.4rem' } }, q); })
            )
          : null,
        timestamps.length
          ? h('div', { style: { marginBottom: '1rem', display: 'flex', flexDirection: 'column', gap: '0.35rem' } },
              timestamps.map(function (t, i) {
                return h('p', { key: i, className: 't-body', style: { display: 'flex', gap: '0.75rem', margin: 0 } },
                  h('span', { className: 't-meta', style: { flexShrink: 0 } }, t.time), t.label);
              })
            )
          : null,
        topics.length
          ? h('div', { className: 'rs-tags', style: { marginBottom: '1rem' } },
              topics.map(function (t, i) { return h('span', { key: i }, t); })
            )
          : null,
        resources.length
          ? h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '0.5rem', marginBottom: '1rem' } },
              resources.map(function (r, i) {
                return h('span', { key: i, className: 't-meta', style: { border: '1px solid var(--c-line)', borderRadius: '999px', padding: '4px 10px' } },
                  (r.type || 'Resource') + (r.url ? '' : ' — available soon'));
              })
            )
          : null,
        data.translationKey ? h('p', { className: 't-meta' }, 'Translation key: ' + data.translationKey) : null
      );
    };

    CMS.registerPreviewTemplate('rethinking-episodes', EpisodePreview);

    // ── After publishing, jump back to this entry's collection list ──
    // With direct publish (no editorial workflow), Decap otherwise just
    // shows a small toast and leaves you on the same entry, which reads
    // as "did this actually save?" — this makes the result visible.
    // Registered under both event names since it isn't confirmed which
    // one this Decap version actually fires for a direct "Publish now"
    // on a brand-new entry — harmless to register both.
    var goToCollectionList = function () {
      var match = window.location.hash.match(/^#\/collections\/[^/]+/);
      if (match) window.location.hash = match[0];
    };
    CMS.registerEventListener({ name: 'postSave', handler: goToCollectionList });
    CMS.registerEventListener({ name: 'postPublish', handler: goToCollectionList });

    // ── Floating link back to the "Start Here" section chooser ─────
    // Appended directly to <body>, outside Decap's own mounted root,
    // so it can't interfere with its React tree.
    var backLink = document.createElement('a');
    backLink.href = '/admin/start.html';
    backLink.textContent = '← Start Here';
    backLink.style.cssText = 'position:fixed;bottom:16px;left:16px;z-index:9999;' +
      'background:#2d3a30;color:#fff;padding:8px 14px;border-radius:999px;' +
      'font:500 13px system-ui,sans-serif;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.25);';
    document.body.appendChild(backLink);
  </script>
</body>
</html>
